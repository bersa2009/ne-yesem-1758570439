name: ne_yesem
description: "Dolapta ne varsa, sofrada lezzet olsun!"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  # State Management
  flutter_riverpod: ^2.4.9
  # AI/ML Dependencies
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1
  # Firebase ML (for future online training)
  firebase_core: ^2.24.2
  firebase_ml_model_downloader: ^0.2.4+2
  # Additional utilities
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/ingredients.json
    - assets/substitutions.json
    - assets/data/
    - assets/models/

