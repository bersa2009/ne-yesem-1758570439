name: ne_yesem
description: "Dolapta ne varsa, sofrada lezzet olsun!"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Camera & Barcode
  camera: ^0.10.5+9
  mobile_scanner: ^4.0.1
  image: ^4.1.7
  
  # Voice Input & TTS
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2
  
  # Siri & Assistant Integration
  siri_wave: ^0.0.4
  flutter_app_shortcuts: ^1.0.1
  
  # Database & Storage
  sqflite: ^2.3.3+1
  shared_preferences: ^2.2.3
  
  # Networking & JSON
  http: ^1.2.1
  json_annotation: ^4.9.0
  
  # UI & Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/data/
    - assets/images/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

