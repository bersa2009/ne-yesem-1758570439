publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  tflite_flutter: ^0.11.0
  firebase_core: ^2.32.0
