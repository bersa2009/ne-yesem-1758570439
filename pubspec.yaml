name: ne_yesem
description: "Dolapta ne varsa, sofrada lezzet olsun!"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  # Kamera ve galeri erişimi
  image_picker: ^1.0.4
  # Ses tanıma ve sentez
  speech_to_text: ^6.1.1
  text_to_speech: ^2.1.2
  # Sesli asistan entegrasyonu
  url_launcher: ^6.2.2
  # Cihaz yetenekleri
  device_info_plus: ^9.1.0
  # Performans ve önbellekleme
  cached_network_image: ^3.3.0
  # Hata yönetimi ve loglama
  logger: ^2.0.2+1
  # Erişilebilirlik
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/ingredients.json
    - assets/substitutions.json
    - assets/icons/
    - assets/images/

