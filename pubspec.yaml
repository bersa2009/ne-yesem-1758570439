publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  # Persistence
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  # Sharing
  share_plus: ^7.2.1
  # Firebase (Auth/Firestore)
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.2
  cloud_firestore: ^4.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/ingredients.json
    - assets/substitutions.json

