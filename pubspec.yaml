name: ne_yesem
description: "Dolapta ne varsa, sofrada lezzet olsun!"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  
  # Camera functionality
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  
  # Voice input
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3
  permission_handler: ^11.0.1
  
  # AI Assistant integration
  flutter_local_notifications: ^16.1.0
  url_launcher: ^6.2.1
  
  # Image processing for ingredient recognition
  google_ml_kit: ^0.16.3
  
  # State management and navigation
  provider: ^6.1.1
  go_router: ^12.1.3
  
  # UI enhancements
  flutter_staggered_animations: ^1.1.1
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/ingredients.json
    - assets/substitutions.json
    - assets/icons/
    - assets/animations/
  
  # App icon configuration
  generate: true

