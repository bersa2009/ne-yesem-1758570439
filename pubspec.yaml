name: ne_yesem
description: "Dolapta ne varsa, sofrada lezzet olsun!"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path: ^1.9.0
  
  # Firebase dependencies
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  google_sign_in: ^6.1.6
  
  # Local storage for offline support
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  
  # PDF generation for shopping lists
  pdf: ^3.10.7
  path_provider: ^2.1.1
  
  # Additional UI components
  provider: ^6.1.1
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json
    - assets/ingredients.json
    - assets/substitutions.json

