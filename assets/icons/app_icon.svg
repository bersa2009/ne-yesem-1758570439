<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F80ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E5CB8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" filter="url(#shadow)"/>
  
  <!-- Chef Hat -->
  <path d="M256 120 C220 120, 190 140, 190 170 C190 180, 195 190, 200 195 L200 220 C200 240, 220 260, 256 260 C292 260, 312 240, 312 220 L312 195 C317 190, 322 180, 322 170 C322 140, 292 120, 256 120 Z" fill="#FFFFFF"/>
  
  <!-- Chef Hat Details -->
  <ellipse cx="256" cy="175" rx="50" ry="25" fill="#F0F0F0"/>
  <ellipse cx="240" cy="160" rx="15" ry="20" fill="#E8E8E8"/>
  <ellipse cx="272" cy="160" rx="15" ry="20" fill="#E8E8E8"/>
  
  <!-- Fork -->
  <g transform="translate(180, 280)">
    <rect x="0" y="0" width="8" height="120" fill="#FFFFFF" rx="4"/>
    <rect x="-6" y="0" width="4" height="30" fill="#FFFFFF" rx="2"/>
    <rect x="2" y="0" width="4" height="30" fill="#FFFFFF" rx="2"/>
    <rect x="10" y="0" width="4" height="30" fill="#FFFFFF" rx="2"/>
  </g>
  
  <!-- Spoon -->
  <g transform="translate(324, 280)">
    <rect x="0" y="0" width="8" height="120" fill="#FFFFFF" rx="4"/>
    <ellipse cx="4" cy="-8" rx="12" ry="18" fill="#FFFFFF"/>
  </g>
  
  <!-- Plate -->
  <ellipse cx="256" cy="320" rx="80" ry="20" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="256" cy="320" rx="60" ry="15" fill="#F8F8F8"/>
  
  <!-- Food Items -->
  <!-- Tomato -->
  <circle cx="240" cy="315" r="12" fill="#FF6B6B"/>
  <path d="M235 308 Q240 305, 245 308" stroke="#4CAF50" stroke-width="2" fill="none"/>
  
  <!-- Carrot -->
  <ellipse cx="272" cy="315" rx="6" ry="15" fill="#FF9500" transform="rotate(15 272 315)"/>
  <path d="M275 305 L278 300 M276 307 L280 302" stroke="#4CAF50" stroke-width="2"/>
  
  <!-- Onion -->
  <ellipse cx="256" cy="310" rx="10" ry="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Question Mark -->
  <g transform="translate(256, 380)">
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.9"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#2F80ED">?</text>
  </g>
</svg>